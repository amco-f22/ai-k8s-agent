apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
---
apiVersion: v1
kind: Service
metadata:
  name: test-app-service
spec:
  selector:
    app: wrong-label # Intentional mismatch to cause no endpoints
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
